<script>

function warn(pdi){
let w=document.getElementById("warn");
if(pdi>100){
w.style.display="block";
w.innerText="Некоректна комбінація: перевищення еталонного рівня неможливе у реальних харчових продуктах.";
}else{
w.style.display="none";
}
}

function pdiText(v){
if(v<15) return "Білок присутній у мінімальній концентрації відносно калорійності";
if(v<30) return "Низька білкова щільність";
if(v<50) return "Помірна білкова щільність";
if(v<70) return "Висока білкова щільність";
return "Дуже висока білкова щільність";
}

function fpdiText(v){
if(v<20) return "Білок має низьку функціональну ефективність";
if(v<40) return "Обмежена біологічна ефективність білка";
if(v<60) return "Стабільна функціональна ефективність білка";
if(v<80) return "Висока біологічна ефективність білка";
return "Максимальна біологічна ефективність білка";
}

function role(v){
if(v<20) return "Додатковий компонент раціону — не формує білкову основу.";
if(v<40) return "Допоміжне джерело білка — підтримує баланс.";
if(v<60) return "Базове джерело білка — придатне для регулярного використання.";
if(v<80) return "Основне джерело білка — формує білкову структуру раціону.";
return "Ключове білкове джерело — високоефективна основа харчування.";
}

function structure(v){
if(v<30) return "Переважно вуглеводно-жирова структура з низькою білковою часткою.";
if(v<55) return "Змішана структура з помітною білковою складовою.";
if(v<75) return "Білково-орієнтована харчова структура.";
return "Висококонцентрована білкова структура продукту.";
}

function calc(){

let p=+document.getElementById("protein").value;
let c=+document.getElementById("calories").value;
let q=+document.getElementById("type").value;

if(!p||!c) return;

let pdi=(p/c)*400;
let fpdi=pdi*q;

warn(pdi);

document.getElementById("res").style.display="block";

document.getElementById("pdi").innerText=pdi.toFixed(1)+"%";
document.getElementById("fpdi").innerText=fpdi.toFixed(1)+"%";

document.getElementById("pdiText").innerText=pdiText(pdi);
document.getElementById("fpdiText").innerText=fpdiText(fpdi);

document.getElementById("finalText").innerText="Продукт: " + role(fpdi);
document.getElementById("roleText").innerText=role(fpdi);
document.getElementById("structureText").innerText=structure(fpdi);

}

/* ENTER SUPPORT */
document.addEventListener("keydown", function(e){
if(e.key === "Enter"){
calc();
}
});

</script>
